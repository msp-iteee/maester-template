name: Maester Daily Scan

on:
  workflow_call:
    secrets:
      AZURE_TENANT_ID:
        required: true
      AZURE_CLIENT_ID:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  run-maester:
    runs-on: [self-hosted, proxmox, maester]
    steps:
      - uses: actions/checkout@v4

      - name: Datum setzen
        run: echo "NOW=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Login via OIDC (kein Passwort!)
        uses: azure/login@v2
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Maester ausfuehren
        shell: pwsh
        run: |
          $token = az account get-access-token --resource-type ms-graph
          $at = ($token | ConvertFrom-Json).accessToken |
                ConvertTo-SecureString -AsPlainText -Force
          Connect-MgGraph -AccessToken $at
          Install-Module Maester -Force -Scope CurrentUser
          Install-MaesterTests -Path ./tests
          $cfg = New-PesterConfiguration
          $cfg.Output.Verbosity = 'None'
          Invoke-Maester -Path ./tests -PesterConfiguration $cfg `
            -OutputFolder test-results -OutputFolderFileName "test-results" -PassThru
          $md = Get-Content test-results/test-results.md
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $md

      - name: HTML-Report hochladen
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maester-report-${{ env.NOW }}
          path: test-results

      - name: E-Mail senden
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.office365.com
          server_port: 587
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Maester Report ${{ env.NOW }} - ${{ github.repository }}"
          to: security@it-eee.de
          from: maester@it-eee.de
          html_body: |
            Scan abgeschlossen fuer: ${{ github.repository }}
            Direkt zum Report: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
