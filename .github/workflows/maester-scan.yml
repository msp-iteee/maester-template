name: Maester Daily Scan
on:
  workflow_call:
    secrets:
      ENTRA_TENANT_ID:
        required: true
      ENTRA_CLIENT_ID:
        required: true
      ENTRA_CLIENT_SECRET:
        required: true
      IONOS_API_TOKEN:
        required: false
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-maester:
    runs-on: [self-hosted, proxmox, maester]
    steps:
      - uses: actions/checkout@v4
      - name: Datum setzen
        run: echo "NOW=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
      - name: Maester ausfuehren
        env:
          ENTRA_TENANT_ID:     ${{ secrets.ENTRA_TENANT_ID }}
          ENTRA_CLIENT_ID:     ${{ secrets.ENTRA_CLIENT_ID }}
          ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
        shell: pwsh
        run: |
          Install-Module Maester -Force -Scope CurrentUser
          $secSec = ConvertTo-SecureString $env:ENTRA_CLIENT_SECRET -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential($env:ENTRA_CLIENT_ID,$secSec)
          Connect-MgGraph -TenantId $env:ENTRA_TENANT_ID -ClientSecretCredential $cred
          Install-MaesterTests -Path ./tests
          $cfg = New-PesterConfiguration
          $cfg.Output.Verbosity = 'None'
          try {
            Invoke-Maester -Path ./tests -PesterConfiguration $cfg `
              -OutputFolder test-results -OutputFolderFileName "test-results" -PassThru
          } catch {
            Write-Host "Browser-Open uebersprungen (kein GUI): $_"
          }
          if (Test-Path test-results/test-results.md) {
            $md = Get-Content test-results/test-results.md -Raw
            if ($md.Length -gt 900000) {
              $md = $md.Substring(0, 900000) + "`n`n*[Gekuerzt - vollstaendiger Report im Artifact]*"
            }
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $md
          }
          exit 0
      - name: HTML-Report hochladen
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maester-report-${{ env.NOW }}
          path: test-results
      - name: Ergebnisse an MSP Security Dashboard senden
        if: always()
        shell: pwsh
        env:
          IONOS_API_TOKEN: ${{ secrets.IONOS_API_TOKEN }}
        run: |
          $kunde = ($env:GITHUB_REPOSITORY -split '/')[-1] -replace '^kunde-', ''
          $today = (Get-Date -Format 'yyyy-MM-dd')
          $passed = 0
          $failed = 0
          if (Test-Path "test-results/test-results.md") {
            $md = Get-Content "test-results/test-results.md" -Raw
            Write-Host "=== MD ERSTE 20 ZEILEN ==="
            ($md -split "`n")[0..19] | ForEach-Object { Write-Host $_ }
            Write-Host "=== MD ENDE ==="
            # Format: | **Total** | **Passed** | **Failed** | ...
            if ($md -match '\| \*\*(\d+)\*\* \| \*\*(\d+)\*\* \| \*\*(\d+)\*\*') {
              $passed = [int]$Matches[2]
              $failed = [int]$Matches[3]
            }
            Write-Host "Parsed: passed=$passed failed=$failed" 
          }
          $reportHtml = $null
          if (Test-Path "test-results/test-results.html") {
            $size = (Get-Item "test-results/test-results.html").Length
            if ($size -lt 15MB) {
              $bytes = [System.IO.File]::ReadAllBytes("test-results/test-results.html")
              $ms    = New-Object System.IO.MemoryStream
              $gz    = New-Object System.IO.Compression.GZipStream($ms, [System.IO.Compression.CompressionMode]::Compress)
              $gz.Write($bytes, 0, $bytes.Length)
              $gz.Close()
              $reportHtml = [Convert]::ToBase64String($ms.ToArray())
              Write-Host "Report: $([math]::Round($size/1MB,1)) MB -> $([math]::Round($ms.Length/1KB,0)) KB (gzip)"
            } else {
              Write-Host "Report zu gross ($([math]::Round($size/1MB,1)) MB), wird nicht gesendet."
            }
          }
          $payload = @{ token=$env:IONOS_API_TOKEN; customer=$kunde; date=$today; passed=$passed; failed=$failed }
          if ($reportHtml) { $payload.report_html = $reportHtml }

          # Einzeltests aus Maester-Markdown parsen
          $testsArr = @()
          if (Test-Path "test-results/test-results.md") {
            $lines = Get-Content "test-results/test-results.md"
            foreach ($line in $lines) {
              if ($line -match '^\|\s*([A-Za-z][A-Za-z0-9\.\-_]{2,}?)\s*\|\s*(.+?)\s*\|\s*([\u2705\u274C]|Pass|Fail|passed|failed)') {
                $tid   = $Matches[1].Trim()
                $tname = ($Matches[2].Trim() -replace '\*','').Trim()
                if ($tname -match '<br|Total Tests|^-+$|^:?-') { continue }
                $res   = if ($Matches[3] -match '[\u2705]|Pass|passed') { 'passed' } else { 'failed' }
                $testsArr += @{ id=$tid; name=$tname; result=$res; category='' }
              }
            }
            if ($testsArr.Count -eq 0) {
              $i = 0
              foreach ($line in $lines) {
                if ($line -match '^\|\s*(.{5,100}?)\s*\|\s*([\u2705\u274C]|Pass|Fail)') {
                  $tname = ($Matches[1].Trim() -replace '\*','').Trim()
                  if ($tname -match '<br|Total Tests|^-+$|^:?-') { continue }
                  $res   = if ($Matches[2] -match '[\u2705]|Pass') { 'passed' } else { 'failed' }
                  $testsArr += @{ id="test.$i"; name=$tname; result=$res; category='' }
                  $i++
                }
              }
            }
            Write-Host "Tests geparst: $($testsArr.Count)"
          }
          if ($testsArr.Count -gt 0) { $payload.tests = $testsArr }

          # Einzeltests aus Maester-Markdown parsen
          $testsArr = @()
          if (Test-Path "test-results/test-results.md") {
            $lines = Get-Content "test-results/test-results.md"
            foreach ($line in $lines) {
              if ($line -match '^\|\s*([A-Za-z][A-Za-z0-9\.\-_]{2,}?)\s*\|\s*(.+?)\s*\|\s*([тЬЕтЭМ]|Pass|Fail|passed|failed)') {
                $tid   = $Matches[1].Trim()
                $tname = ($Matches[2].Trim() -replace '\*','').Trim()
                $res   = if ($Matches[3] -match '[тЬЕ]|Pass|passed') { 'passed' } else { 'failed' }
                $testsArr += @{ id=$tid; name=$tname; result=$res; category='' }
              }
            }
            if ($testsArr.Count -eq 0) {
              $i = 0
              foreach ($line in $lines) {
                if ($line -match '^\|\s*(.{5,100}?)\s*\|\s*([тЬЕтЭМ]|Pass|Fail)') {
                  $tname = ($Matches[1].Trim() -replace '\*','').Trim()
                  $res   = if ($Matches[2] -match '[тЬЕ]|Pass') { 'passed' } else { 'failed' }
                  $testsArr += @{ id="test.$i"; name=$tname; result=$res; category='' }
                  $i++
                }
              }
            }
            Write-Host "Tests geparst: $($testsArr.Count)"
          }
          if ($testsArr.Count -gt 0) { $payload.tests = $testsArr }
          try {
            $resp = Invoke-RestMethod -Uri "https://mspsecurity.it-eee.de/api/ingest.php" `
              -Method Post -Body ($payload | ConvertTo-Json -Compress) `
              -ContentType "application/json" -TimeoutSec 60
            Write-Host "Dashboard: $($resp | ConvertTo-Json -Compress)"
          } catch {
            Write-Host "Dashboard-Upload fehlgeschlagen (nicht kritisch): $_"
          }

